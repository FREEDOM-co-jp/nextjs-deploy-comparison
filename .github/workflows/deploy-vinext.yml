name: Deploy to Cloudflare Workers via vinext

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install vinext
        run: npm install vinext vite @vitejs/plugin-rsc @cloudflare/vite-plugin --save-dev

      - name: Run vinext init
        run: npx vinext init --skip-check --force

      - name: Deploy to Cloudflare Workers
        run: npx vinext deploy --name nextjs-deploy-comparison
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
