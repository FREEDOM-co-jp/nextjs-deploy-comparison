name: Deploy to Cloudflare Workers via vinext

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install vinext and deps
        run: npm install vinext vite @vitejs/plugin-rsc @cloudflare/vite-plugin --save-dev

      - name: Run vinext init
        run: npx vinext init --skip-check --force

      - name: Build with vinext
        run: npx vinext deploy --name nextjs-deploy-comparison --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Fix wrangler config and deploy
        run: |
          cat wrangler.jsonc || true
          node -e "
            const fs = require('fs');
            let raw = fs.readFileSync('wrangler.jsonc', 'utf8');
            let cleaned = raw.replace(/\/\/.*$/gm, '');
            cleaned = cleaned.replace(/\/\*[\s\S]*?\*\//g, '');
            cleaned = cleaned.replace(/,\s*([}\]])/g, '\$1');
            let obj = JSON.parse(cleaned);
            if (obj.assets && typeof obj.assets === 'object' && !obj.assets.directory) {
              obj.assets.directory = 'dist/client';
            } else if (!obj.assets) {
              obj.assets = { directory: 'dist/client' };
            }
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(obj, null, 2));
            console.log(JSON.stringify(obj, null, 2));
          "
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
