name: Deploy to Cloudflare Workers via vinext

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install vinext and deps
        run: npm install vinext vite @vitejs/plugin-rsc @cloudflare/vite-plugin wrangler --save-dev

      - name: Run vinext init
        run: npx vinext init --skip-check --force

      - name: Build and attempt deploy (allow wrangler config failure)
        id: vinext_deploy
        continue-on-error: true
        run: npx vinext deploy --name nextjs-deploy-comparison
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Fix wrangler.jsonc assets directory
        if: steps.vinext_deploy.outcome == 'failure'
        run: |
          echo "=== Current wrangler.jsonc ==="
          cat wrangler.jsonc || echo "No wrangler.jsonc found"
          echo ""
          node -e "
            const fs = require('fs');
            const f = 'wrangler.jsonc';
            if (!fs.existsSync(f)) { console.log('No wrangler.jsonc'); process.exit(1); }
            let c = fs.readFileSync(f, 'utf8');
            // Remove JSONC comments
            c = c.replace(/\/\/.*$/gm, '');
            const cfg = JSON.parse(c);
            if (!cfg.assets) cfg.assets = {};
            cfg.assets.directory = './dist/client';
            fs.writeFileSync(f, JSON.stringify(cfg, null, 2));
            console.log('Fixed wrangler.jsonc:', JSON.stringify(cfg, null, 2));
          "

      - name: Redeploy with wrangler using fixed config
        if: steps.vinext_deploy.outcome == 'failure'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
