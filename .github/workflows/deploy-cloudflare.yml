name: Deploy to Cloudflare Workers via @opennextjs/cloudflare

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install OpenNext and Wrangler
        run: npm install @opennextjs/cloudflare wrangler --save-dev --legacy-peer-deps

      - name: Create wrangler.jsonc
        run: |
          cat > wrangler.jsonc << 'WRANGLER_EOF'
          {
            "$schema": "node_modules/wrangler/config-schema.json",
            "main": ".open-next/worker.js",
            "name": "nextjs-deploy-comparison",
            "compatibility_date": "2025-03-01",
            "compatibility_flags": [
              "nodejs_compat"
            ],
            "assets": {
              "directory": ".open-next/assets",
              "binding": "ASSETS",
              "run_worker_first": true
            }
          }
          WRANGLER_EOF

      - name: Create open-next.config.ts
        run: |
          cat > open-next.config.ts << 'OPENNEXT_EOF'
          import type { OpenNextConfig } from "@opennextjs/cloudflare";

          const config: OpenNextConfig = {
            default: {},
          };

          export default config;
          OPENNEXT_EOF

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "03ca2e9c1668f5473475ee788ed4267d"
